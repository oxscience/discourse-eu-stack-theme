<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <linearGradient id="eu-grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#2E8B47"/>
    </linearGradient>
    <linearGradient id="eu-grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d8cff"/>
      <stop offset="100%" stop-color="#2E6A9A"/>
    </linearGradient>
    <linearGradient id="eu-grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7B4EA0"/>
    </linearGradient>
    <linearGradient id="eu-grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#3A7AAA"/>
    </linearGradient>
    <linearGradient id="eu-grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8b8b8"/>
      <stop offset="100%" stop-color="#6b6560"/>
    </linearGradient>
  </defs>
</svg>

<script type="text/discourse-plugin" version="0.8">
  // Apply gradient fills to category box SVG icons
  const gradientMap = {
    "health": "eu-grad-green",
    "forschung": "eu-grad-blue",
    "tech": "eu-grad-cyan",
    "pro-teams": "eu-grad-purple"
  };

  function applyGradients() {
    document.querySelectorAll(".category-box").forEach(function(box) {
      var link = box.querySelector("a.parent-box-link");
      var svg = box.querySelector("svg.d-icon");
      if (!link || !svg) return;

      // Skip if already applied
      if (svg.dataset.euGrad) return;

      var href = link.getAttribute("href") || "";
      var gradId = "eu-grad-gray"; // default

      for (var key in gradientMap) {
        if (href.indexOf(key) > -1) {
          gradId = gradientMap[key];
          break;
        }
      }

      // For SVGs using <use>, we need to set fill on the svg element
      // and ensure the use element inherits it
      svg.setAttribute("fill", "url(#" + gradId + ")");
      svg.style.color = "url(#" + gradId + ")";

      // Also try setting on the use element directly
      var useEl = svg.querySelector("use");
      if (useEl) {
        useEl.setAttribute("fill", "url(#" + gradId + ")");
      }

      svg.dataset.euGrad = gradId;
    });
  }

  // Use Discourse's API to hook into route transitions
  api.onPageChange(function() {
    setTimeout(applyGradients, 300);
    setTimeout(applyGradients, 800);
  });
</script>
