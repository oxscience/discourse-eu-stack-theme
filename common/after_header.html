<script type="text/x-handlebars" data-template-name="/connectors/below-site-header/ox-landing">
  {{#unless currentUser}}
    <div class="ox-landing">

      {{!-- Hero Section --}}
      <section class="ox-landing__hero">
        <div class="ox-landing__hero-inner">
          <h1 class="ox-landing__title">Die Community f&uuml;r<br><span class="ox-landing__title-accent">Science, Education &amp; Tech</span></h1>
          <p class="ox-landing__subtitle">Evidenzbasiertes Wissen, gemeinsam weitergedacht. Diskutiere mit Forschern, Dozenten und Tech-Enthusiasten &mdash; offen, unabh&auml;ngig, werbefrei.</p>
          <div class="ox-landing__cta">
            <a href="/signup" class="btn btn-primary ox-landing__btn-primary">Kostenlos beitreten</a>
            <a href="/about" class="btn btn-default ox-landing__btn-secondary">Mehr erfahren</a>
          </div>
        </div>
      </section>

      {{!-- Features --}}
      <section class="ox-landing__features">
        <div class="ox-landing__features-grid">
          <div class="ox-landing__feature-card">
            <div class="ox-landing__feature-icon">
              {{d-icon "flask"}}
            </div>
            <h3>Science</h3>
            <p>Trainings&shy;wissenschaft, Ern&auml;hrung, Genetik &mdash; fundiert diskutiert statt Bro-Science.</p>
          </div>
          <div class="ox-landing__feature-card">
            <div class="ox-landing__feature-icon">
              {{d-icon "graduation-cap"}}
            </div>
            <h3>Education</h3>
            <p>Kurse, Symposien und Ressourcen f&uuml;r Lehrende, Studierende und lebenslanges Lernen.</p>
          </div>
          <div class="ox-landing__feature-card">
            <div class="ox-landing__feature-icon">
              {{d-icon "code"}}
            </div>
            <h3>Tech &amp; KI</h3>
            <p>Tools, Workflows und KI-Anwendungen &mdash; von Praktikern f&uuml;r Praktiker.</p>
          </div>
        </div>
      </section>

      {{!-- Social Proof --}}
      <section class="ox-landing__proof">
        <div class="ox-landing__proof-inner">
          <div class="ox-landing__proof-item">
            <span class="ox-landing__proof-number">100%</span>
            <span class="ox-landing__proof-label">Werbefrei</span>
          </div>
          <div class="ox-landing__proof-divider"></div>
          <div class="ox-landing__proof-item">
            <span class="ox-landing__proof-number">Open</span>
            <span class="ox-landing__proof-label">Community</span>
          </div>
          <div class="ox-landing__proof-divider"></div>
          <div class="ox-landing__proof-item">
            <span class="ox-landing__proof-number">EU</span>
            <span class="ox-landing__proof-label">Hosted &amp; DSGVO</span>
          </div>
        </div>
      </section>

    </div>
  {{/unless}}
</script>
