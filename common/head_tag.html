<script type="text/discourse-plugin" version="0.8">
  // Gradient icon overlays for category boxes
  // Since SVG <use> can't reference external gradients,
  // we clone each icon into an inline <svg> with embedded gradient defs.

  const gradients = {
    "health": { colors: ["#34d399", "#2E8B47"] },
    "forschung": { colors: ["#6d8cff", "#2E6A9A"] },
    "tech": { colors: ["#67e8f9", "#3A7AAA"] },
    "pro-teams": { colors: ["#a78bfa", "#7B4EA0"] },
    "_default": { colors: ["#b8b8b8", "#6b6560"] }
  };

  function getGradient(href) {
    for (const key in gradients) {
      if (key !== "_default" && href.indexOf(key) > -1) return gradients[key];
    }
    return gradients["_default"];
  }

  function applyGradientIcons() {
    document.querySelectorAll(".category-box").forEach(function(box) {
      if (box.dataset.euGrad) return;

      const link = box.querySelector("a.parent-box-link");
      const svg = box.querySelector("svg.d-icon");
      if (!link || !svg) return;

      const href = link.getAttribute("href") || "";
      const grad = getGradient(href);

      // Get the symbol ID from the <use> element
      const useEl = svg.querySelector("use");
      if (!useEl) return;
      const symbolRef = useEl.getAttribute("href") || useEl.getAttribute("xlink:href");
      if (!symbolRef) return;

      // Find the actual symbol definition in the sprite sheet
      const symbolId = symbolRef.replace("#", "");
      const symbol = document.getElementById(symbolId);
      if (!symbol) return;

      // Create a new standalone SVG with the gradient baked in
      const uid = "eu-g-" + Math.random().toString(36).substr(2, 6);
      const newSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      const vb = symbol.getAttribute("viewBox") || "0 0 512 512";
      newSvg.setAttribute("viewBox", vb);
      newSvg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      newSvg.setAttribute("aria-hidden", "true");
      newSvg.setAttribute("class", svg.getAttribute("class") + " eu-gradient-icon");
      newSvg.style.width = svg.style.width || "1em";
      newSvg.style.height = svg.style.height || "1em";

      // Add gradient definition
      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      const linearGrad = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
      linearGrad.setAttribute("id", uid);
      linearGrad.setAttribute("x1", "0%");
      linearGrad.setAttribute("y1", "0%");
      linearGrad.setAttribute("x2", "100%");
      linearGrad.setAttribute("y2", "100%");

      const stop1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      stop1.setAttribute("offset", "0%");
      stop1.setAttribute("stop-color", grad.colors[0]);
      const stop2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      stop2.setAttribute("offset", "100%");
      stop2.setAttribute("stop-color", grad.colors[1]);

      linearGrad.appendChild(stop1);
      linearGrad.appendChild(stop2);
      defs.appendChild(linearGrad);
      newSvg.appendChild(defs);

      // Copy the symbol's inner content and apply gradient fill
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("fill", "url(#" + uid + ")");
      g.innerHTML = symbol.innerHTML;
      newSvg.appendChild(g);

      // Replace the original SVG
      svg.style.display = "none";
      svg.parentNode.insertBefore(newSvg, svg.nextSibling);
      box.dataset.euGrad = "1";
    });
  }

  api.onPageChange(function() {
    setTimeout(applyGradientIcons, 300);
    setTimeout(applyGradientIcons, 1000);
  });
</script>
