<script>
(function() {
  function fix404() {
    var homeBtn = document.querySelector('.page-not-found .btn, .not-found-container .btn, a[href="/"].btn');
    if (!homeBtn || document.querySelector('.ox-upgrade-btn')) return;

    // Add upgrade button right after home button
    var upgradeBtn = document.createElement('a');
    upgradeBtn.href = 'https://outoftheb-ox.de/pages/oxcampus#ox-pricing';
    upgradeBtn.className = homeBtn.className + ' ox-upgrade-btn';
    upgradeBtn.innerHTML = 'Upgraden \u2192';
    homeBtn.after(upgradeBtn);

    // Update headline text
    var headlines = document.querySelectorAll('.page-not-found h1, .not-found-container h1, .page-not-found h2, .not-found-container h2');
    headlines.forEach(function(h) {
      if (h.textContent.includes('existiert nicht')) {
        h.textContent = 'Hoppla! Diese Seite existiert nicht oder ist nicht freigeschaltet.';
      }
    });
  }

  // Use Discourse's API if available, otherwise observe
  if (window.require) {
    try {
      var api = window.require('discourse/lib/plugin-api');
    } catch(e) {}
  }

  var observer = new MutationObserver(fix404);
  document.addEventListener('DOMContentLoaded', function() {
    observer.observe(document.body, { childList: true, subtree: true });
  });
  setTimeout(function() { observer.disconnect(); }, 15000);
})();
</script>
