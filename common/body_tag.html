<script>
(function() {
  function addUpgradeButton() {
    var homeBtn = document.querySelector('.page-not-found .btn, .not-found-container .btn, a[href="/"].btn');
    if (!homeBtn || document.querySelector('.ox-upgrade-btn')) return;

    // Fix alignment: make parent flex
    homeBtn.parentNode.style.display = 'inline-flex';
    homeBtn.parentNode.style.alignItems = 'center';
    homeBtn.parentNode.style.gap = '10px';

    var upgradeBtn = document.createElement('a');
    upgradeBtn.href = 'https://outoftheb-ox.de/pages/oxcampus#ox-pricing';
    upgradeBtn.className = 'ox-upgrade-btn';
    upgradeBtn.innerHTML = 'Upgraden \u2192';
    upgradeBtn.style.cssText = 'display:inline-flex;align-items:center;padding:10px 20px;border-radius:6px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:#e8e6e3;font-size:inherit;font-weight:600;text-decoration:none;transition:all 0.2s ease;';
    upgradeBtn.onmouseenter = function() { this.style.borderColor = 'rgba(109,140,255,0.5)'; this.style.color = '#6d8cff'; };
    upgradeBtn.onmouseleave = function() { this.style.borderColor = 'rgba(255,255,255,0.25)'; this.style.color = '#e8e6e3'; };
    homeBtn.parentNode.insertBefore(upgradeBtn, homeBtn.nextSibling);

    // Change 404 text
    var headline = document.querySelector('.page-not-found h1, .not-found-container h1');
    if (headline && headline.textContent.includes('existiert nicht')) {
      headline.textContent = 'Hoppla! Diese Seite existiert nicht oder ist nicht freigeschaltet.';
    }
  }

  var observer = new MutationObserver(function() {
    if (document.querySelector('.page-not-found, .not-found-container')) {
      addUpgradeButton();
    }
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      observer.observe(document.body, { childList: true, subtree: true });
    });
  } else {
    observer.observe(document.body, { childList: true, subtree: true });
  }

  setTimeout(function() { observer.disconnect(); }, 15000);
})();
</script>
