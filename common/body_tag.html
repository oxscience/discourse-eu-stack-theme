<script>
(function() {
  function fix404() {
    if (document.querySelector('.ox-404-buttons')) return;
    var container = document.querySelector('.page-not-found, .not-found-container');
    if (!container) return;

    // Find the original button to insert after
    var originalBtn = container.querySelector('a.btn[href="/"]');
    if (!originalBtn) return;

    // Build our own button row
    var row = document.createElement('div');
    row.className = 'ox-404-buttons';
    row.innerHTML = '<a href="/" class="ox-404-btn ox-404-btn--home">\u{1F3E0} Zur\u00fcck zur Startseite</a><a href="https://outoftheb-ox.de/pages/oxcampus#ox-pricing" class="ox-404-btn ox-404-btn--upgrade">Upgraden \u2192</a>';

    originalBtn.parentNode.insertBefore(row, originalBtn);

    // Update headline text
    var headlines = container.querySelectorAll('h1, h2');
    headlines.forEach(function(h) {
      if (h.textContent.includes('existiert nicht')) {
        h.textContent = 'Hoppla! Diese Seite existiert nicht oder ist nicht freigeschaltet.';
      }
    });
  }

  var observer = new MutationObserver(fix404);
  document.addEventListener('DOMContentLoaded', function() {
    observer.observe(document.body, { childList: true, subtree: true });
  });
  setTimeout(function() { observer.disconnect(); }, 15000);
})();
</script>
